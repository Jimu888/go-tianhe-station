<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>自由卡校准（HD 1080×2160）</title>
  <style>
    :root{--bg:#070c16;--card:rgba(255,255,255,.08);--stroke:rgba(255,255,255,.14);--text:rgba(255,255,255,.9)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;color:var(--text);
      background:radial-gradient(1100px 700px at 20% 10%, rgba(159,214,255,.10), transparent 62%),
      linear-gradient(135deg,#080d18 0%,#0e1a30 55%,#070c16 100%);
      min-height:100vh;}
    .wrap{max-width:1280px;margin:0 auto;padding:18px 16px 40px;display:grid;grid-template-columns: 740px 1fr;gap:16px;align-items:start}
    @media (max-width: 980px){.wrap{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:18px;backdrop-filter:blur(16px);box-shadow:0 18px 60px rgba(0,0,0,.35);overflow:hidden}
    .pad{padding:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
    .title{font-weight:900;letter-spacing:.2px}
    .muted{opacity:.72;font-size:12px;line-height:1.35}

    /* HD stage */
    .stage{position:relative;width:1080px;height:2160px;border-radius:0;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35)}
    .viewport{width:100%;height:calc(100vh - 170px);min-height:720px;overflow:auto;display:flex;justify-content:flex-start;align-items:flex-start;padding:10px}
    .inner{transform:scale(0.55);transform-origin:top left}

    img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}

    .overlay{position:absolute;z-index:50;cursor:move;user-select:none;
      padding:0;border-radius:0;background:transparent;outline:2px dashed rgba(159,214,255,.65);outline-offset:8px;
      -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;white-space:nowrap;touch-action:none;line-height:1;}

    /* Spec: PingFang + #979595 (Regular) */
    .name{font-weight:400;font-size:108px;letter-spacing:.5px;color:#979595;text-shadow:none;
      font-family:"PingFang SC","PingFangSC-Regular","PingFang SC Regular",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans SC","Microsoft YaHei",sans-serif}
    .no{font-weight:400;font-size:48px;letter-spacing:.2px;color:#979595;text-shadow:none;
      font-family:"PingFang SC","PingFangSC-Regular","PingFang SC Regular",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans SC","Microsoft YaHei",sans-serif}

    .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    select,input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:var(--text);outline:none}
    .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer}
    .btn.primary{background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(209,233,255,.88));color:rgba(10,14,24,.96)}

    .grid{display:grid;grid-template-columns: 44px 44px 44px;gap:8px;justify-content:start}
    .k{padding:10px}
    code{display:block;white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:10px;font-size:12px;line-height:1.35}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card pad">
      <div class="topbar">
        <div>
          <div class="title">自由卡校准（HD 1080×2160）</div>
          <div class="muted">拖动名字/编号；或用按钮微调。Alt=调编号；Shift=10px。复制 JSON 或下载合并 cards.json。</div>
        </div>
        <div style="min-width:260px;">
          <div class="muted" style="margin-bottom:6px;">缩放（只影响显示，不影响输出）</div>
          <input id="zoom" type="range" min="0.30" max="1" step="0.01" value="0.55" />
        </div>
      </div>

      <div class="viewport card">
        <div class="inner">
          <div class="stage" id="stage">
            <img id="img" src="/assets/cards/1.jpg?v=hd" alt="card" />
            <div class="overlay name" id="name">章人丹</div>
            <div class="overlay no" id="no">（编号#00001）</div>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card pad">
        <div class="row">
          <div style="flex:1">
            <div class="muted">选择卡片</div>
            <select id="cardSel">
              <option value="1">卡 1</option><option value="2">卡 2</option><option value="3">卡 3</option><option value="4">卡 4</option>
              <option value="5">卡 5</option><option value="6">卡 6</option><option value="7">卡 7</option><option value="8">卡 8</option>
              <option value="9">卡 9</option><option value="10">卡 10</option><option value="11">卡 11</option><option value="12">卡 12</option>
            </select>
          </div>
          <div style="flex:1">
            <div class="muted">名字预览</div>
            <input id="nameInput" value="章人丹" />
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn" id="copyOne">复制当前卡 JSON</button>
          <button class="btn" id="downloadAll">下载 cards.json（合并）</button>
          <button class="btn primary" id="reset">重置到默认</button>
        </div>
      </div>

      <div class="card pad">
        <div class="row" style="gap:16px">
          <div>
            <div class="muted" style="margin-bottom:6px">调名字（位置/字号）</div>
            <div class="row" style="margin:6px 0 10px; gap:8px">
              <button class="btn k" data-fs="name" data-dfs="-1">A-</button>
              <button class="btn k" data-fs="name" data-dfs="1">A+</button>
              <button class="btn k" data-fsstep="name">fs+1</button>
            </div>
            <div class="grid">
              <button class="btn k" data-t="name" data-dx="0" data-dy="-1">↑</button><div></div><button class="btn k" data-step="name">+1</button>
              <button class="btn k" data-t="name" data-dx="-1" data-dy="0">←</button><button class="btn k" data-t="name" data-dx="0" data-dy="1">↓</button><button class="btn k" data-t="name" data-dx="1" data-dy="0">→</button>
            </div>
          </div>
          <div>
            <div class="muted" style="margin-bottom:6px">调编号（位置/字号）</div>
            <div class="row" style="margin:6px 0 10px; gap:8px">
              <button class="btn k" data-fs="no" data-dfs="-1">A-</button>
              <button class="btn k" data-fs="no" data-dfs="1">A+</button>
              <button class="btn k" data-fsstep="no">fs+1</button>
            </div>
            <div class="grid">
              <button class="btn k" data-t="no" data-dx="0" data-dy="-1">↑</button><div></div><button class="btn k" data-step="no">+1</button>
              <button class="btn k" data-t="no" data-dx="-1" data-dy="0">←</button><button class="btn k" data-t="no" data-dx="0" data-dy="1">↓</button><button class="btn k" data-t="no" data-dx="1" data-dy="0">→</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card pad">
        <div class="muted" style="margin-bottom:8px">输出（发我这一段即可）</div>
        <code id="out">{}</code>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (id)=>document.getElementById(id)
  const img = $('img')
  const nameEl = $('name')
  const noEl = $('no')
  const cardSel = $('cardSel')
  const nameInput = $('nameInput')
  const out = $('out')
  const zoomEl = $('zoom')
  const inner = document.querySelector('.inner')

  let ZOOM = 0.55
  if (inner) inner.style.transform = `scale(${ZOOM})`
  if (zoomEl) {
    zoomEl.addEventListener('input', ()=>{
      ZOOM = parseFloat(zoomEl.value || '0.55')
      if (inner) inner.style.transform = `scale(${ZOOM})`
    })
  }

  let step = { name: 1, no: 1 }
  let fsStep = { name: 1, no: 1 }
  let allCfg = {}

  function px(n){ return Math.round(n) + 'px' }
  function xy(el){ return { left: parseFloat(el.style.left||'80'), top: parseFloat(el.style.top||'1600') } }
  function set(el, left, top){ el.style.left = px(left); el.style.top = px(top) }

  function dumpOne(cardId){
    const n = xy(nameEl), k = xy(noEl)
    const nfs = parseFloat(getComputedStyle(nameEl).fontSize)
    const kfs = parseFloat(getComputedStyle(noEl).fontSize)
    const cfg = {
      name: { left: Math.round(n.left), top: Math.round(n.top), font: Math.round(nfs) },
      no:   { left: Math.round(k.left), top: Math.round(k.top), font: Math.round(kfs) }
    }
    allCfg[String(cardId)] = cfg
    return cfg
  }

  function refreshOut(){
    const id = Number(cardSel.value)
    const one = dumpOne(id)
    out.textContent = JSON.stringify({ [String(id)]: one }, null, 2)
  }

  function loadCard(id){
    img.src = `/assets/cards/${id}.jpg?v=${Date.now()}`
    nameEl.textContent = nameInput.value || '章人丹'
    noEl.textContent = '（编号#00001）'
    // defaults
    set(nameEl, 80, 1500)
    set(noEl, 640, 1500)
    img.onload = () => refreshOut()
  }

  function drag(el){
    let start=null
    el.addEventListener('mousedown', (e)=>{
      e.preventDefault()
      const p = xy(el)
      start={x:e.clientX,y:e.clientY,left:p.left,top:p.top}
      const mm=(ev)=>{ if(!start) return; set(el, start.left+(ev.clientX-start.x)/ZOOM, start.top+(ev.clientY-start.y)/ZOOM); refreshOut() }
      const mu=()=>{ window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); start=null }
      window.addEventListener('mousemove',mm)
      window.addEventListener('mouseup',mu)
    })
  }

  drag(nameEl); drag(noEl)

  document.addEventListener('keydown', (e)=>{
    const keys=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown']
    if(!keys.includes(e.key)) return
    e.preventDefault()
    const tgt = e.altKey ? noEl : nameEl
    const s = e.shiftKey ? 10 : 1
    const p = xy(tgt)
    if(e.key==='ArrowLeft') set(tgt, p.left-s, p.top)
    if(e.key==='ArrowRight') set(tgt, p.left+s, p.top)
    if(e.key==='ArrowUp') set(tgt, p.left, p.top-s)
    if(e.key==='ArrowDown') set(tgt, p.left, p.top+s)
    refreshOut()
  })

  document.body.addEventListener('click', async (e)=>{
    const b = e.target.closest('button')
    if(!b) return

    if (b.id === 'copyOne'){
      const text = out.textContent
      try{ await navigator.clipboard.writeText(text); alert('已复制') } catch { alert('复制失败') }
    }
    if (b.id === 'downloadAll'){
      const id = Number(cardSel.value)
      dumpOne(id)
      const blob = new Blob([JSON.stringify(allCfg,null,2)],{type:'application/json'})
      const url = URL.createObjectURL(blob)
      const a=document.createElement('a'); a.href=url; a.download='cards.json'; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500)
    }
    if (b.id === 'reset'){
      allCfg={}; loadCard(Number(cardSel.value));
    }

    const stepKey = b.getAttribute('data-step')
    if (stepKey){
      step[stepKey] = step[stepKey]===1 ? 10 : 1
      b.textContent = '+'+step[stepKey]
    }

    const fsStepKey = b.getAttribute('data-fsstep')
    if (fsStepKey){
      fsStep[fsStepKey] = fsStep[fsStepKey]===1 ? 4 : 1
      b.textContent = 'fs+'+fsStep[fsStepKey]
    }

    const fsTarget = b.getAttribute('data-fs')
    if (fsTarget){
      const dfs = Number(b.getAttribute('data-dfs'))
      const tgt = fsTarget==='no' ? noEl : nameEl
      const cur = parseFloat(getComputedStyle(tgt).fontSize)
      const next = Math.max(10, cur + dfs * fsStep[fsTarget])
      tgt.style.fontSize = px(next)
      refreshOut()
    }

    const t = b.getAttribute('data-t')
    if (t){
      const dx = Number(b.getAttribute('data-dx'))
      const dy = Number(b.getAttribute('data-dy'))
      const tgt = t==='no' ? noEl : nameEl
      const p = xy(tgt)
      const s = step[t]
      set(tgt, p.left+dx*s, p.top+dy*s)
      refreshOut()
    }
  })

  cardSel.addEventListener('change', ()=>loadCard(Number(cardSel.value)))
  nameInput.addEventListener('input', ()=>{ nameEl.textContent = nameInput.value||'章人丹'; refreshOut() })

  loadCard(1)
})()
</script>
</body>
</html>
