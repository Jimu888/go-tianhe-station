<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>自由卡校准（同主站渲染）</title>
  <link rel="stylesheet" href="./css/poster.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{--bg:#070c16;--card:rgba(255,255,255,.08);--stroke:rgba(255,255,255,.14);--text:rgba(255,255,255,.92)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;color:var(--text);
      background:radial-gradient(1100px 700px at 20% 10%, rgba(159,214,255,.10), transparent 62%),
      linear-gradient(135deg,#080d18 0%,#0e1a30 55%,#070c16 100%);
      min-height:100vh;}
    .wrap{max-width:1400px;margin:0 auto;padding:16px;display:grid;grid-template-columns: 1fr 420px;gap:14px;align-items:start}
    @media (max-width: 980px){.wrap{grid-template-columns:1fr}}
    .glass{background:var(--card);border:1px solid var(--stroke);border-radius:16px;backdrop-filter:blur(16px);box-shadow:0 18px 60px rgba(0,0,0,.35)}
    .pad{padding:14px}
    .title{font-weight:900;letter-spacing:.2px}
    .sub{opacity:.72;font-size:12px;line-height:1.35}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    select,input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:var(--text);outline:none}
    .btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer}
    .btn.primary{background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(209,233,255,.88));color:rgba(10,14,24,.96)}
    code{display:block;white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:10px;font-size:12px;line-height:1.35}

    .cols{display:grid;grid-template-columns: 1fr 1fr;gap:14px}
    @media (max-width: 1100px){.cols{grid-template-columns:1fr}}

    .viewport{width:100%;height:calc(100vh - 180px);min-height:680px;overflow:auto;padding:12px;display:flex;justify-content:center;align-items:flex-start}
    .zoomWrap{transform:scale(var(--zoom, .5));transform-origin:top center}

    /* Make overlays draggable in calib page (main site has cursor default) */
    #exportNameText,#exportNoText{cursor:move;user-select:none;touch-action:none}

    .kgrid{display:grid;grid-template-columns:44px 44px 44px;gap:8px;justify-content:start}
    .k{padding:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glass pad">
      <div class="row" style="justify-content:space-between;align-items:flex-end">
        <div>
          <div class="title">自由卡校准（同主站渲染）</div>
          <div class="sub">这页直接复用主站的 exportCard DOM + poster.css，并用 html2canvas 渲染预览图。你对齐右侧“渲染预览图”，导出就会 1:1 命中。</div>
        </div>
        <div style="min-width:260px">
          <div class="sub" style="margin-bottom:6px">缩放（只影响操作视图）</div>
          <input id="zoom" type="range" min="0.25" max="1" step="0.01" value="0.50" />
        </div>
      </div>

      <div class="cols" style="margin-top:12px">
        <div class="glass" style="overflow:hidden">
          <div class="pad" style="padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.10)">
            <div style="font-weight:800">操作视图（DOM）</div>
            <div class="sub">拖动名字/编号；方向键微调（Shift=10px，Alt=编号）。</div>
          </div>
          <div class="viewport">
            <div class="zoomWrap" id="zoomWrap">
              <div class="shareCard" id="exportCard">
                <img class="posterImg" id="exportPosterImg" src="./assets/cards/1.jpg" alt="card" />
                <div class="nameOverlay" id="exportNameText">章人丹</div>
                <div class="noOverlay" id="exportNoText">（编号#00001）</div>
              </div>
            </div>
          </div>
        </div>

        <div class="glass" style="overflow:hidden">
          <div class="pad" style="padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.10)">
            <div style="font-weight:800">渲染预览图（html2canvas）</div>
            <div class="sub">你以这张图为准校准；它就是主站最终保存出来的样子。</div>
          </div>
          <div class="viewport" style="justify-content:center">
            <div class="zoomWrap" style="transform:scale(var(--zoom, .5));transform-origin:top center">
              <img id="rendered" alt="rendered" style="display:block;width:1080px;height:2160px;object-fit:cover" />
            </div>
          </div>
        </div>
      </div>

    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="glass pad">
        <div class="row">
          <div style="flex:1">
            <div class="sub">选择卡片</div>
            <select id="cardSel">
              <option value="1">卡 1</option><option value="2">卡 2</option><option value="3">卡 3</option><option value="4">卡 4</option>
              <option value="5">卡 5</option><option value="6">卡 6</option><option value="7">卡 7</option><option value="8">卡 8</option>
              <option value="9">卡 9</option><option value="10">卡 10</option><option value="11">卡 11</option><option value="12">卡 12</option>
            </select>
          </div>
          <div style="flex:1">
            <div class="sub">名字预览</div>
            <input id="nameInput" value="章人丹" />
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <button class="btn" id="copyOne">复制当前卡 JSON</button>
          <button class="btn" id="downloadAll">下载 cards.json（合并）</button>
          <button class="btn primary" id="rerender">刷新渲染预览</button>
        </div>
      </div>

      <div class="glass pad">
        <div class="sub" style="margin-bottom:8px">微调（方向按钮）</div>
        <div class="row" style="gap:16px">
          <div>
            <div class="sub" style="opacity:.75;margin-bottom:6px">名字</div>
            <div class="kgrid">
              <button class="btn k" data-t="name" data-dx="0" data-dy="-1">↑</button><div></div><button class="btn k" data-step="name">+10</button>
              <button class="btn k" data-t="name" data-dx="-1" data-dy="0">←</button><button class="btn k" data-t="name" data-dx="0" data-dy="1">↓</button><button class="btn k" data-t="name" data-dx="1" data-dy="0">→</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button class="btn k" data-fs="name" data-dfs="-1">A-</button>
              <button class="btn k" data-fs="name" data-dfs="1">A+</button>
            </div>
          </div>
          <div>
            <div class="sub" style="opacity:.75;margin-bottom:6px">编号</div>
            <div class="kgrid">
              <button class="btn k" data-t="no" data-dx="0" data-dy="-1">↑</button><div></div><button class="btn k" data-step="no">+10</button>
              <button class="btn k" data-t="no" data-dx="-1" data-dy="0">←</button><button class="btn k" data-t="no" data-dx="0" data-dy="1">↓</button><button class="btn k" data-t="no" data-dx="1" data-dy="0">→</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button class="btn k" data-fs="no" data-dfs="-1">A-</button>
              <button class="btn k" data-fs="no" data-dfs="1">A+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="glass pad">
        <div class="sub" style="margin-bottom:8px">输出（发我这一段即可）</div>
        <code id="out">{}</code>
      </div>

    </div>
  </div>

<script>
(() => {
  const $ = (id)=>document.getElementById(id)
  const exportCard = $('exportCard')
  const img = $('exportPosterImg')
  const nameEl = $('exportNameText')
  const noEl = $('exportNoText')
  const rendered = $('rendered')
  const cardSel = $('cardSel')
  const nameInput = $('nameInput')
  const out = $('out')
  const zoomEl = $('zoom')

  let step = { name: 10, no: 10 }
  let allCfg = {}

  function px(n){ return Math.round(n) + 'px' }
  function xy(el){ return { left: parseFloat(el.style.left||'0'), top: parseFloat(el.style.top||'0') } }
  function set(el, left, top){ el.style.left = px(left); el.style.top = px(top) }

  // Zoom only affects interaction view; coordinates remain in 1080x2160 space.
  let ZOOM = 0.5
  document.documentElement.style.setProperty('--zoom', ZOOM)
  zoomEl.addEventListener('input', ()=>{
    ZOOM = parseFloat(zoomEl.value || '0.5')
    document.documentElement.style.setProperty('--zoom', ZOOM)
  })

  function dumpOne(cardId){
    const n = xy(nameEl), k = xy(noEl)
    const nfs = parseFloat(getComputedStyle(nameEl).fontSize)
    const kfs = parseFloat(getComputedStyle(noEl).fontSize)
    const cfg = {
      name: { left: Math.round(n.left), top: Math.round(n.top), font: Math.round(nfs) },
      no:   { left: Math.round(k.left), top: Math.round(k.top), font: Math.round(kfs) }
    }
    allCfg[String(cardId)] = cfg
    out.textContent = JSON.stringify({ [String(cardId)]: cfg }, null, 2)
    return cfg
  }

  let renderTimer = null
  async function renderNow(){
    // Important: html2canvas must see the card in DOM (it is visible here)
    const canvas = await html2canvas(exportCard, { backgroundColor: null, scale: 1, useCORS: true, allowTaint: true, logging: false })
    rendered.src = canvas.toDataURL('image/png')
  }
  function scheduleRender(){
    clearTimeout(renderTimer)
    renderTimer = setTimeout(()=>{ renderNow().catch(()=>{}) }, 120)
  }

  function loadCard(id){
    img.src = `./assets/cards/${id}.jpg?v=${Date.now()}`
    nameEl.textContent = nameInput.value || '章人丹'
    noEl.textContent = '（编号#00001）'

    // Default anchor (rough) — you will calibrate anyway.
    set(nameEl, 40, 1640)
    set(noEl, 720, 1700)

    img.onload = () => { dumpOne(id); renderNow().catch(()=>{}) }
  }

  function drag(el){
    let start=null
    el.addEventListener('mousedown', (e)=>{
      e.preventDefault()
      const p = xy(el)
      start={x:e.clientX,y:e.clientY,left:p.left,top:p.top}
      const mm=(ev)=>{ if(!start) return; set(el, start.left+(ev.clientX-start.x)/ZOOM, start.top+(ev.clientY-start.y)/ZOOM); dumpOne(Number(cardSel.value)); scheduleRender() }
      const mu=()=>{ window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); start=null }
      window.addEventListener('mousemove',mm)
      window.addEventListener('mouseup',mu)
    })
  }
  drag(nameEl); drag(noEl)

  document.addEventListener('keydown', (e)=>{
    const keys=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown']
    if(!keys.includes(e.key)) return
    e.preventDefault()
    const tgt = e.altKey ? noEl : nameEl
    const s = e.shiftKey ? 10 : 1
    const p = xy(tgt)
    if(e.key==='ArrowLeft') set(tgt, p.left-s, p.top)
    if(e.key==='ArrowRight') set(tgt, p.left+s, p.top)
    if(e.key==='ArrowUp') set(tgt, p.left, p.top-s)
    if(e.key==='ArrowDown') set(tgt, p.left, p.top+s)
    dumpOne(Number(cardSel.value)); scheduleRender()
  })

  document.body.addEventListener('click', async (e)=>{
    const b = e.target.closest('button')
    if(!b) return

    if (b.id === 'rerender') return renderNow().catch(()=>{})

    if (b.id === 'copyOne'){
      const text = out.textContent
      try{ await navigator.clipboard.writeText(text) } catch {}
      return
    }

    if (b.id === 'downloadAll'){
      const id = Number(cardSel.value)
      dumpOne(id)
      const blob = new Blob([JSON.stringify(allCfg,null,2)],{type:'application/json'})
      const url = URL.createObjectURL(blob)
      const a=document.createElement('a'); a.href=url; a.download='cards.json'; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1500)
      return
    }

    const stepKey = b.getAttribute('data-step')
    if (stepKey){
      step[stepKey] = step[stepKey]===1 ? 10 : 1
      b.textContent = '+'+step[stepKey]
      return
    }

    const fsTarget = b.getAttribute('data-fs')
    if (fsTarget){
      const dfs = Number(b.getAttribute('data-dfs'))
      const tgt = fsTarget==='no' ? noEl : nameEl
      const cur = parseFloat(getComputedStyle(tgt).fontSize)
      const next = Math.max(10, cur + dfs)
      tgt.style.fontSize = px(next)
      dumpOne(Number(cardSel.value)); scheduleRender()
      return
    }

    const t = b.getAttribute('data-t')
    if (t){
      const dx = Number(b.getAttribute('data-dx'))
      const dy = Number(b.getAttribute('data-dy'))
      const tgt = t==='no' ? noEl : nameEl
      const p = xy(tgt)
      const s = step[t]
      set(tgt, p.left+dx*s, p.top+dy*s)
      dumpOne(Number(cardSel.value)); scheduleRender()
      return
    }
  })

  cardSel.addEventListener('change', ()=>loadCard(Number(cardSel.value)))
  nameInput.addEventListener('input', ()=>{ nameEl.textContent = nameInput.value||'章人丹'; dumpOne(Number(cardSel.value)); scheduleRender() })

  loadCard(1)
})()
</script>
</body>
</html>
