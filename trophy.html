<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>自由卡领取</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/poster.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <meta name="referrer" content="no-referrer" />
</head>
<body>
  <div class="container">
    <div class="hero">
      <!-- 左侧：预览 -->
      <div class="card pad" id="export">
        <h2 style="margin:0 0 10px; font-size:18px;">卡片预览</h2>
        <div class="shareWrap">
          <div id="debugInfo" class="sub" style="display:none; margin:8px 0 0; opacity:.7;"></div>
          <div class="previewBox">
            <div class="previewInner">
              <div class="shareCard" id="shareCard">
                <!-- Closed (before claim) -->
                <div class="closedState" id="closedState">
                  <div class="chest" aria-hidden="true">
                    <div class="chestLid"></div>
                    <div class="chestBody"></div>
                    <div class="chestLock"></div>
                    <div class="chestGlow"></div>
                  </div>
                  <div class="closedText">
                    <div class="closedTitle">自由卡卡盒</div>
                    <div class="closedSub">输入名字，点击「保存卡片」开启抽卡<br/><span style="opacity:.7; font-size:12px;">测试模式：在网址后加 ?test=1&card=1..12</span></div>
                  </div>
                </div>

                <!-- Open (after claim): show rendered image generated from exportCard -->
                <div class="openState" id="openState" style="display:none;">
                  <img class="posterImg" id="previewImg" src="" alt="card" />
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：两个小玻璃卡片（参考图风格） -->
      <div style="display:flex; flex-direction:column; gap:14px;">
        
        <!-- 卡片1：输入名字 -->
        <div class="card pad">
          <h1 class="h1" style="font-size:24px; margin:0 0 8px;">领取你的自由卡</h1>
          <p class="sub" style="margin:0 0 10px;">只填名字。系统会随机分配卡面（含限量/不限量），并生成卡牌编号。</p>

          <div class="field" style="margin-top:10px;">
            <label>昵称</label>
            <input id="nameInput" type="text" placeholder="比如：章人丹" maxlength="16" />
          </div>
        </div>

        <!-- 卡片2：文案参考 + 人机校验 + 保存按钮（保存按钮放这里下面） -->
        <div class="card pad">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <h2 style="margin:0; font-size:16px; letter-spacing:.2px;">文案参考</h2>
            <button class="btn secondary" id="btnCopy" type="button" style="padding:10px 12px;">复制</button>
          </div>
          <textarea id="copyText" rows="5" style="margin-top:10px; resize:none;">世界很大，别把自己困在一站。
天河路站 · The Portal to Freedom.
通往「自由」的传送门。</textarea>
          <div style="margin-top:12px;">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACpFsB4Kr7ny-pF4" data-theme="dark"></div>
          </div>

          <div class="btnrow" style="margin-top:14px;">
            <button class="btn" id="btnDownload" type="button">抽取卡片并保存</button>
          </div>

          <!-- Test utilities (only shown when ?test=1) -->
          <div id="testPanel" style="display:none; margin-top:12px;">
            <div class="btnrow">
              <button class="btn secondary" id="btnExportAll12" type="button">一键导出 12 张（ZIP，测试）</button>
            </div>
            <div class="sub" id="exportAllHint" style="margin-top:8px; opacity:.75; display:none;"></div>
          </div>

          <!-- Calibration panel (only shown when ?calib=1) -->
          <div id="calibPanel" style="display:none; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.12);">
            <div class="sub" style="margin-bottom:10px; opacity:.85;">校准模式：拖动名字/编号到正确位置；方向键微调（Shift=10px）。</div>
            <div class="btnrow" style="margin-top:10px;">
              <button class="btn secondary" id="btnCalibCopy" type="button">复制当前卡配置</button>
              <button class="btn secondary" id="btnCalibDownload" type="button">下载 cards.json（含修改）</button>
            </div>

            <div style="margin-top:12px; display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
              <div>
                <div class="sub" style="opacity:.75; margin-bottom:6px;">调名字（方向按钮）</div>
                <div style="display:grid; grid-template-columns: 44px 44px 44px; gap:8px; justify-content:start;">
                  <button class="btn secondary" id="btnNameUp" type="button" style="padding:10px;">↑</button>
                  <div></div>
                  <button class="btn secondary" id="btnNameStep" type="button" style="padding:10px;">+10</button>
                  <button class="btn secondary" id="btnNameLeft" type="button" style="padding:10px;">←</button>
                  <button class="btn secondary" id="btnNameDown" type="button" style="padding:10px;">↓</button>
                  <button class="btn secondary" id="btnNameRight" type="button" style="padding:10px;">→</button>
                </div>
              </div>
              <div>
                <div class="sub" style="opacity:.75; margin-bottom:6px;">调编号（方向按钮）</div>
                <div style="display:grid; grid-template-columns: 44px 44px 44px; gap:8px; justify-content:start;">
                  <button class="btn secondary" id="btnNoUp" type="button" style="padding:10px;">↑</button>
                  <div></div>
                  <button class="btn secondary" id="btnNoStep" type="button" style="padding:10px;">+10</button>
                  <button class="btn secondary" id="btnNoLeft" type="button" style="padding:10px;">←</button>
                  <button class="btn secondary" id="btnNoDown" type="button" style="padding:10px;">↓</button>
                  <button class="btn secondary" id="btnNoRight" type="button" style="padding:10px;">→</button>
                </div>
              </div>
            </div>
          </div>
          <p class="sub" style="margin:10px 0 0; opacity:.75;">这段不写进海报，只是给用户发朋友圈/推文用。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden export card (NOT scaled) -->
  <div class="exportHidden" aria-hidden="true">
    <div class="shareCard" id="exportCard">
      <img class="posterImg" id="exportPosterImg" src="./assets/cards/1.jpg" alt="card" />
      <div class="nameOverlay" id="exportNameText">章人丹</div>
      <div class="noOverlay" id="exportNoText">（编号#00001）</div>
    </div>
  </div>

  <script src="./js/trophy.js?v=debugcfg"></script>
</body>
</html>
