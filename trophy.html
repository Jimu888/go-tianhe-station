<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>川网GO地铁-自由卡</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/poster.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-sc@5.0.19/400.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <meta name="referrer" content="no-referrer" />
</head>
<body>
  <div class="container">
    <!-- Modal (soft glass) -->
    <div id="modalMask" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,.55); backdrop-filter: blur(6px);"></div>
    <div id="modalBox" style="display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:100000; width:min(440px, calc(100vw - 32px)); border-radius:18px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); box-shadow:0 40px 120px rgba(0,0,0,.55); backdrop-filter: blur(22px); overflow:hidden;">
      <div id="modalHeader" style="padding:16px 18px 14px; border-bottom:1px solid rgba(255,255,255,.10); position:relative;">
        <div style="display:flex; align-items:flex-start; gap:12px;">
          <div id="modalIcon" style="width:10px; height:10px; margin-top:7px; border-radius:999px; background:rgba(159,214,255,.85); box-shadow:0 0 0 6px rgba(159,214,255,.10);"></div>
          <div style="flex:1;">
            <div id="modalTitle" style="font-weight:800; letter-spacing:.2px; font-size:16px;">提示</div>
            <div id="modalText" class="sub" style="margin-top:6px; font-size:14px; line-height:1.55;"></div>
          </div>
        </div>
        <button id="modalClose" type="button" aria-label="close" style="position:absolute; right:12px; top:12px; width:34px; height:34px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:rgba(255,255,255,.86); cursor:pointer;">×</button>
      </div>
      <div style="padding:12px 18px 16px; display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn secondary" id="modalCancel" type="button" style="display:none; padding:10px 14px;">取消</button>
        <button class="btn" id="modalOk" type="button" style="padding:10px 16px;">知道了</button>
      </div>
    </div>
    <div style="text-align:center; margin: 18px 0 14px;">
      <div style="font-weight:900; font-size:26px; letter-spacing:.5px;">天河路地铁站</div>
      <div class="sub" style="margin-top:6px; opacity:.78;">通往自由的传送门</div>
    </div>

    <div class="hero">
      <!-- 左侧：预览 -->
      <div class="card pad" id="export">
        <h2 style="margin:0 0 10px; font-size:18px;">卡片预览</h2>
        <div class="shareWrap">
          <div id="debugInfo" class="sub" style="display:none; margin:8px 0 0; opacity:.7;"></div>
          <div class="previewBox">
            <div class="previewInner">
              <div class="shareCard" id="shareCard">
                <!-- Closed (before claim) -->
                <div class="closedState" id="closedState">
                  <div class="chest" aria-hidden="true">
                    <div class="chestLid"></div>
                    <div class="chestBody"></div>
                    <div class="chestLock"></div>
                    <div class="chestGlow"></div>
                  </div>
                  <div class="closedText">
                    <div class="closedTitle">自由卡卡盒</div>
                    <div class="closedSub">本期自由卡已开放。<br/>常规款 / 隐藏款随机掉落<br/><span style="opacity:.7; font-size:12px;">测试模式：在网址后加 ?test=1&card=1..12</span></div>
                  </div>
                </div>

                <!-- Open (after claim): show rendered image generated from exportCard -->
                <div class="openState" id="openState" style="display:none;">
                  <img class="posterImg" id="previewImg" src="" alt="card" />
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：两个小玻璃卡片（参考图风格） -->
      <div style="display:flex; flex-direction:column; gap:14px;">
        
        <!-- 卡片1：输入名字 -->
        <div class="card pad">
          <h1 class="h1" style="font-size:24px; margin:0 0 8px;">领取你的自由卡</h1>
          <p class="sub" style="margin:0 0 10px;">留下你的昵称，就能申领一张专属于你的天河站自由卡。每一张都拥有独立且唯一编号，限量卡将解锁专属小幸运权益！</p>

          <div class="field" style="margin-top:10px;">
            <label>昵称</label>
            <input id="nameInput" type="text" placeholder="比如：川网GO地铁" maxlength="16" />
          </div>
        </div>

        <!-- 卡片2：文案参考 + 人机校验 + 保存按钮（保存按钮放这里下面） -->
        <div class="card pad">
          <div class="field" style="margin-top:10px;">
            <label>手机号</label>
            <input id="phoneInput" type="tel" placeholder="11位手机号（用于找回/防重复领取）" maxlength="11" inputmode="numeric" />
          </div>

          <div style="margin-top:12px;">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACpFsB4Kr7ny-pF4" data-theme="dark"></div>
          </div>

          <div class="btnrow" style="margin-top:14px;">
            <button class="btn" id="btnDownload" type="button">抽取卡片并保存</button>
          </div>

          <div id="statusBar" class="sub" style="display:none; margin-top:10px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14);"></div>

          <!-- Test utilities (only shown when ?test=1) -->
          <div id="testPanel" style="display:none; margin-top:12px;">
            <div class="btnrow">
              <button class="btn secondary" id="btnExportAll12" type="button">一键导出 12 张（ZIP，测试）</button>
            </div>
            <div class="sub" id="exportAllHint" style="margin-top:8px; opacity:.75; display:none;"></div>
          </div>

          <!-- Calibration panel (only shown when ?calib=1) -->
          <div id="calibPanel" style="display:none; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.12);">
            <div class="sub" style="margin-bottom:10px; opacity:.85;">校准模式：拖动名字/编号到正确位置；方向键微调（Shift=10px）。</div>
            <div class="btnrow" style="margin-top:10px;">
              <button class="btn secondary" id="btnCalibCopy" type="button">复制当前卡配置</button>
              <button class="btn secondary" id="btnCalibDownload" type="button">下载 cards.json（含修改）</button>
            </div>

            <div style="margin-top:12px; display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
              <div>
                <div class="sub" style="opacity:.75; margin-bottom:6px;">调名字（方向按钮）</div>
                <div style="display:grid; grid-template-columns: 44px 44px 44px; gap:8px; justify-content:start;">
                  <button class="btn secondary" id="btnNameUp" type="button" style="padding:10px;">↑</button>
                  <div></div>
                  <button class="btn secondary" id="btnNameStep" type="button" style="padding:10px;">+10</button>
                  <button class="btn secondary" id="btnNameLeft" type="button" style="padding:10px;">←</button>
                  <button class="btn secondary" id="btnNameDown" type="button" style="padding:10px;">↓</button>
                  <button class="btn secondary" id="btnNameRight" type="button" style="padding:10px;">→</button>
                </div>
              </div>
              <div>
                <div class="sub" style="opacity:.75; margin-bottom:6px;">调编号（方向按钮）</div>
                <div style="display:grid; grid-template-columns: 44px 44px 44px; gap:8px; justify-content:start;">
                  <button class="btn secondary" id="btnNoUp" type="button" style="padding:10px;">↑</button>
                  <div></div>
                  <button class="btn secondary" id="btnNoStep" type="button" style="padding:10px;">+10</button>
                  <button class="btn secondary" id="btnNoLeft" type="button" style="padding:10px;">←</button>
                  <button class="btn secondary" id="btnNoDown" type="button" style="padding:10px;">↓</button>
                  <button class="btn secondary" id="btnNoRight" type="button" style="padding:10px;">→</button>
                </div>
              </div>
            </div>
          </div>
          <p class="sub" style="margin:10px 0 0; opacity:.75;">这段不写进海报，只是给用户发朋友圈/推文用。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden export card (NOT scaled) -->
  <div class="exportHidden" aria-hidden="true">
    <div class="shareCard" id="exportCard">
      <img class="posterImg" id="exportPosterImg" src="./assets/cards/1.jpg" alt="card" />
      <div class="nameOverlay" id="exportNameText">章人丹</div>
      <div class="noOverlay" id="exportNoText">（编号#00001）</div>
    </div>
  </div>

  <script src="./js/trophy.js?v=modalbrand"></script>
</body>
</html>
